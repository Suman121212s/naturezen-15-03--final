    <!-- Font loading optimization script -->
    <script>
      (function() {
        // Check if fonts are loaded
        if ('fonts' in document) {
          Promise.all([
            document.fonts.load('1em Inter'),
            document.fonts.load('bold 1em Inter'),
            document.fonts.load('1em Playfair Display'),
            document.fonts.load('1em Merriweather')
          ]).then(function() {
            document.documentElement.classList.add('fonts-loaded');
            
            // Store in session storage for subsequent pages
            try {
              sessionStorage.setItem('fonts-loaded', 'true');
            } catch(e) {}
          });
        } else {
          // Fallback for browsers that don't support Font Loading API
          document.documentElement.classList.add('fonts-loaded');
        }
        
        // Check if fonts were already loaded in this session
        try {
          if (sessionStorage.getItem('fonts-loaded') === 'true') {
            document.documentElement.classList.add('fonts-loaded');
          }
        } catch(e) {}
      })();
    </script>
